openapi: 3.1.0

info:
  title: Kingdom Data Server
  version: 1.0.0
  description: |
    REST API for the Kingdom secure-messaging server (kds).
    All endpoints are served over HTTPS. Authenticated endpoints require a
    Bearer JWT obtained from POST /login or POST /signup.

servers:
  - url: https://localhost:8080
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        username:
          type: string
        publicKey:
          type: string
        token:
          type: string
        sessionToken:
          type: string
      required: [id, username, token, sessionToken]

    LoginResponse:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        username:
          type: string
        token:
          type: string
        sessionToken:
          type: string
      required: [id, username, token, sessionToken]

    PublicKeyResponse:
      type: object
      properties:
        userId:
          type: integer
          format: uint64
        publicKey:
          type: string
      required: [userId, publicKey]

    Conversation:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        name:
          type: string
        participantIds:
          type: array
          items:
            type: integer
            format: uint64
        createdAt:
          type: integer
          format: uint64
          description: Unix timestamp (milliseconds)
      required: [id, name, participantIds, createdAt]

    Message:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        senderId:
          type: integer
          format: uint64
        conversationId:
          type: integer
          format: uint64
        payload:
          type: string
          description: Encrypted message ciphertext
        timestamp:
          type: integer
          format: uint64
          description: Unix timestamp (milliseconds)
        blockchainDigest:
          type: string
          description: On-chain transaction hash for tamper-evidence (empty if sidecar unavailable)
      required: [id, senderId, conversationId, payload, timestamp, blockchainDigest]

paths:
  /:
    get:
      summary: API info
      operationId: getApiInfo
      tags: [Info]
      responses:
        '200':
          description: Server name and version
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                    example: Kingdom Server
                  version:
                    type: string
                    example: '1.0'

  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [Info]
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /signup:
    post:
      summary: Register a new user
      operationId: signup
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 64
                password:
                  type: string
                  minLength: 12
                  maxLength: 72
                  pattern: '^(?=.*[A-Z])(?=.*[0-9]).+$'
                  description: Must include at least one uppercase letter and one number.
                publicKey:
                  type: string
                  minLength: 1
              required: [username, password, publicKey]
      responses:
        '201':
          description: User created; returns a session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /login:
    post:
      summary: Authenticate and obtain a session token
      operationId: login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 64
                password:
                  type: string
                  minLength: 1
                  maxLength: 72
              required: [username, password]
      responses:
        '200':
          description: Authenticated; returns a session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /logout:
    post:
      summary: Revoke the current session token
      operationId: logout
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Logged out

  /users/{userId}/public-key:
    get:
      summary: Retrieve a user's published public key
      operationId: getUserPublicKey
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        '200':
          description: Public key found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKeyResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{userId}/conversations:
    get:
      summary: List all conversations a user participates in
      operationId: getUserConversations
      tags: [Conversations]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        '200':
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Token does not belong to the requested user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /conversations:
    post:
      summary: Create a new conversation
      operationId: createConversation
      tags: [Conversations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 128
                participantIds:
                  type: array
                  items:
                    type: integer
                    format: uint64
                  description: Must not contain duplicates
              required: [name, participantIds]
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: uint64
                  name:
                    type: string
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /conversations/{conversationId}/messages:
    get:
      summary: Get all messages in a conversation visible to the authenticated user
      operationId: getMessages
      tags: [Messages]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: User is not a participant in the conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Send a message to a conversation
      operationId: sendMessage
      tags: [Messages]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                senderId:
                  type: integer
                  format: uint64
                  description: Must match the authenticated user's id
                payload:
                  type: string
                  minLength: 1
                  maxLength: 65536
                  description: Encrypted message ciphertext
                recipientId:
                  type: integer
                  format: uint64
                  nullable: true
                  description: Optional targeted recipient (must be a participant)
              required: [senderId, payload]
      responses:
        '201':
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Sender mismatch or user is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /conversations/{conversationId}/messages/{messageId}:
    delete:
      summary: Delete a message (sender only)
      operationId: deleteMessage
      tags: [Messages]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
            format: uint64
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
                  messageId:
                    type: integer
                    format: uint64
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: User is not a participant in the conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message not found or not owned by sender
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /conversations/{conversationId}/messages/{messageId}/access/{targetUserId}:
    delete:
      summary: Revoke a participant's future access to a specific message
      operationId: revokeMessageAccess
      tags: [Messages]
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
            format: uint64
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
            format: uint64
        - name: targetUserId
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        '200':
          description: Access revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: revoked
                  messageId:
                    type: integer
                    format: uint64
                  userId:
                    type: integer
                    format: uint64
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller or target is not a conversation participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message access record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
