# Ansible Playbook for deploying microservices to coruscant VM.
#
# The purpose of this playbook is to enable us to do the equivalent of
# a `helm apply` on our infrastructure, so that the version of application
# images can develop asymmetrically, and application releases not be coupled
# to deployments.
#
# Note that you must have permissions to SSH into the VM to be able
# to execute this playbook.

- name: kds and postgres deployments
  hosts: updakingdom
  become: yes
  vars_files:
    - vars/app_values.yml
    - vars/secrets.yml

  tasks:
    - name: Remove conflicting containerd.io
      apt:
        name: containerd.io
        state: absent

    - name: Install docker.io
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Pull parent repo
      ansible.builtin.git:
        repo: "{{ repo_ssh_url }}"
        dest: "{{ repo_pull_dest }}"
        version: "main"
        accept_hostkey: yes
        recursive: no
      become_user: deployment
      environment:
        GIT_SSH_COMMAND: "ssh -i {{ gh_pull_key_file }} -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

    - name: Write .env file
      ansible.builtin.copy:
        dest: "{{ repo_pull_dest }}/.env"
        content: |
          KD_PORT={{ kd_port | default(8080) }}
          KD_LOG_LEVEL={{ kd_log_level | default('info') }}
          POSTGRES_PASSWORD={{ postgres_password }}
          POSTGRES_USER={{ postgres_user }}
          POSTGRES_DB={{ postgres_db }}
          POSTGRES_PORT={{ postgres_port }}
          POSTGRES_HOST=db
      become_user: deployment

    - name: Stop old containers
      community.docker.docker_compose_v2:
        project_src: "{{ repo_pull_dest }}"
        state: absent
      become_user: deployment

    - name: Pull latest images
      community.docker.docker_compose_v2:
        project_src: "{{ repo_pull_dest }}"
        pull: always
      become_user: deployment

    - name: Start stack
      community.docker.docker_compose_v2:
        project_src: "{{ repo_pull_dest }}"
        state: present
      become_user: deployment
