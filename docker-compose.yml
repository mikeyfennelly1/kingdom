services:
  app:
    build: .
    image: mikeyfennelly/kds:latest
    container_name: kds
    restart: unless-stopped
    ports:
      - "${KD_PORT:-80}:${KD_PORT:-8080}"
    volumes:
      - ./certs:/app/certs:ro
    environment:
      - KD_LOG_LEVEL=${KD_LOG_LEVEL:-info}
      - KD_PORT=${KD_PORT:-8080}
      - KD_DB_URL=${KD_DB_URL}
      - KD_TLS_CERT=${KD_TLS_CERT:-certs/server.crt}
      - KD_TLS_KEY=${KD_TLS_KEY:-certs/server.key}
      - KD_JWT_SECRET=${KD_JWT_SECRET}
      - KD_JWT_TTL_SECONDS=${KD_JWT_TTL_SECONDS:-3600}
      - KD_RATE_LIMIT_MAX_REQUESTS=${KD_RATE_LIMIT_MAX_REQUESTS:-10}
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - KD_BLOCKCHAIN_SIDECAR_URL=${KD_BLOCKCHAIN_SIDECAR_URL:-http://sidecar:3001}
      - KD_BLOCKCHAIN_SIDECAR_SECRET=${KD_BLOCKCHAIN_SIDECAR_SECRET}
    depends_on:
      db:
        condition: service_healthy
      sidecar:
        condition: service_started

  sidecar:
    image: node:lts-alpine
    container_name: kd-sidecar
    working_dir: /app
    volumes:
      - ./blockchain/sidecar:/app
    command: sh -c "npm install && node index.js"
    environment:
      - SEPOLIA_RPC_URL=${SEPOLIA_RPC_URL}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
      - BLOCKCHAIN_SIDECAR_SECRET=${KD_BLOCKCHAIN_SIDECAR_SECRET}
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: kdb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
