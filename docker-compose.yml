services:
  app:
    build: .
    image: mikeyfennelly/kds:latest
    container_name: kingdom-app
    restart: unless-stopped
    ports:
      - "${KD_PORT:-8080}:${KD_PORT:-8080}"
    volumes:
      - ./certs:/app/certs:ro
    environment:
      - KD_LOG_LEVEL=${KD_LOG_LEVEL:-info}
      - KD_PORT=${KD_PORT:-8080}
      - KD_DB_URL=${KD_DB_URL}
      - KD_TLS_CERT=${KD_TLS_CERT:-certs/server.crt}
      - KD_TLS_KEY=${KD_TLS_KEY:-certs/server.key}
      - KD_JWT_SECRET=${KD_JWT_SECRET}
      - KD_JWT_TTL_SECONDS=${KD_JWT_TTL_SECONDS:-3600}
      - KD_RATE_LIMIT_MAX_REQUESTS=${KD_RATE_LIMIT_MAX_REQUESTS:-10}
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: kingdom-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
