---
- name: Configure nginx reverse proxy to kds
  hosts: "{{ target_hosts | default('configure_vm') }}"
  become: yes

  tasks:
    - name: Write reverse proxy site config
      copy:
        dest: /etc/nginx/sites-available/kingdom
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              server_name _;

              location / {
                  proxy_pass https://127.0.0.1:8080;
                  proxy_ssl_verify off;

                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

    - name: Enable kingdom site
      file:
        src: /etc/nginx/sites-available/kingdom
        dest: /etc/nginx/sites-enabled/kingdom
        state: link

    - name: Disable default site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test nginx config
      command: nginx -t
      changed_when: false

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
