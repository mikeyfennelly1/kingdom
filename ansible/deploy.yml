# Ansible Playbook for deploying microservices to coruscant VM.
#
# Fetches docker-compose.yml directly from mainline on GitHub and runs
# docker compose up — no repo clone required.
#
# Note that you must have permissions to SSH into the VM to be able
# to execute this playbook.

- name: kds and postgres deployments
  hosts: deployment_vm
  vars_files:
    - vars/app_values.yml
    - vars/secrets.yml

  tasks:
    - name: Ensure deploy directory exists
      ansible.builtin.file:
        path: "{{ repo_pull_dest }}"
        state: directory
        owner: deployment
        group: deployment
        mode: '0755'

    - name: Fetch docker-compose.yml from mainline
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/mikeyfennelly1/kingdom/main/docker-compose.yml"
        dest: "{{ repo_pull_dest }}/docker-compose.yml"
        owner: deployment
        group: deployment
        mode: '0644'
        force: yes

    - name: Ensure certs directory exists
      ansible.builtin.file:
        path: "{{ repo_pull_dest }}/certs"
        state: directory
        owner: deployment
        group: deployment
        mode: '0755'

    - name: Copy TLS certificate
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../certs/server.crt"
        dest: "{{ repo_pull_dest }}/certs/server.crt"
        owner: deployment
        group: deployment
        mode: '0644'

    - name: Copy TLS private key
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../certs/server.key"
        dest: "{{ repo_pull_dest }}/certs/server.key"
        owner: deployment
        group: deployment
        mode: '0600'
      become: yes

    - name: Remove existing .env file
      ansible.builtin.file:
        path: "{{ repo_pull_dest }}/.env"
        state: absent

    - name: Write .env file
      ansible.builtin.copy:
        dest: "{{ repo_pull_dest }}/.env"
        content: |
          # Server Config
          KD_PORT={{ kd_port | default(8080) }}
          KD_LOG_LEVEL={{ kd_log_level | default('info') }}
          KD_JWT_SECRET={{ kd_jwt_secret | default('change_me_to_a_secure_random_string_at_least_32_chars_long') }}
          KD_TLS_CERT=certs/server.crt
          KD_TLS_KEY=certs/server.key
          
          # Database Config
          POSTGRES_PASSWORD={{ postgres_password }}
          POSTGRES_USER={{ postgres_user }}
          POSTGRES_DB={{ postgres_db }}
          POSTGRES_PORT={{ postgres_port | default(5432) }}
          POSTGRES_HOST=db
          
          # App Database URL (key=value format avoids @ in password breaking URL parsing)
          KD_DB_URL=host=db port=5432 user={{ postgres_user }} password={{ postgres_password }} dbname={{ postgres_db }}

          # Blockchain Sidecar
          SEPOLIA_RPC_URL={{ sepolia_rpc_url }}
          PRIVATE_KEY={{ blockchain_private_key }}
          CONTRACT_ADDRESS={{ contract_address }}

    - name: Stop old containers
      community.docker.docker_compose_v2:
        project_src: "{{ repo_pull_dest }}"
        state: absent
      become: yes
      ignore_errors: yes

    - name: Remove old kds images
      ansible.builtin.shell: docker images mikeyfennelly/kds -q | xargs -r docker rmi -f
      become: yes
      ignore_errors: yes

    - name: Pull latest images
      community.docker.docker_compose_v2:
        project_src: "{{ repo_pull_dest }}"
        pull: always
      become: yes

    - name: Start stack
      community.docker.docker_compose_v2:
        project_src: "{{ repo_pull_dest }}"
        state: present
      become: yes

    - name: Wait for kds to attempt startup
      ansible.builtin.pause:
        seconds: 8

    - name: Fetch kds container logs
      ansible.builtin.command: docker logs --tail 50 kds
      register: kds_logs
      become: yes

    - name: Print kds startup logs
      ansible.builtin.debug:
        msg: "{{ kds_logs.stdout_lines + kds_logs.stderr_lines }}"

    - name: Get kds container state
      community.docker.docker_container_info:
        name: kds
      register: kds_info
      become: yes

    - name: Fail if kds is not running
      ansible.builtin.fail:
        msg: "kds failed to start — see logs above"
      when: not kds_info.container.State.Running
