version: '3'

tasks:
  build:
    desc: Compiles the project using CMake and Ninja (via Nix shell)
    cmds:
      - ./scripts/build.sh

  run:
    desc: Builds and executes the kds binary
    deps: [build]
    dotenv: ['.env']
    cmds:
      - ./build/kds/kds

  clean:
    desc: Removes build artifacts
    cmds:
      - rm -rf build

  uml:
    desc: Generate UML artifacts
    cmds:
      - plantuml -tsvg docs/arch.puml
      - echo "SVG generated in docs/arch.svg"

  test:
    desc: Runs all project tests
    deps: [build]
    cmds:
      - cd build && ctest --output-on-failure

  format:
    desc: Formats all source files using clang-format
    cmds:
      - find . -name "*.cc" -o -name "*.hh" -o -name "*.hpp" -exec clang-format -i {} +
