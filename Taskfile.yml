version: '3'

tasks:
  build:
    desc: Compiles the project using CMake and Ninja
    cmds:
      - ./scripts/build.sh

  run:
    desc: Builds and executes the kds binary
    deps: [build]
    cmds:
      - ./build/kds/kds

  clean:
    desc: Removes build artifacts
    cmds:
      - rm -rf build

  uml:
    desc: Generate UML artifacts
    cmds:
      - plantuml -tsvg docs/arch.puml
      - echo "SVG generated in docs/arch.svg"

  test:
    desc: Runs all project tests
    cmds:
      - ./scripts/test.sh

  lint:
    desc: Runs clang-tidy as part of the build process
    cmds:
      - ./scripts/static-analysis.sh

  format:
    desc: Formats all source files using clang-format
    cmds:
      - find kdctl kds libkd -name "*.cc" -o -name "*.hh" -o -name "*.hpp" | xargs clang-format -i

  format-check:
    desc: Checks if all source files are formatted correctly
    cmds:
      - ./scripts/static-analysis.sh

  shellcheck:
    desc: Runs ShellCheck on all scripts
    cmds:
      - ./scripts/shellcheck.sh
