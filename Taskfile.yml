
version: '3'


tasks:
  build:
    desc: Compiles the project using CMake and Ninja
    cmds:
      - cmake -B build -GNinja
      - cmake --build build

  run:
    desc: Builds and executes the kds binary
    deps: [build]
    cmds:
      - ./build/kds/kds

  clean:
    desc: Removes build artifacts
    cmds:
      - rm -rf build

  uml:

    desc: Generate UML artifacts
    cmds:
      - plantuml -tsvg docs/arch.puml
      - echo "$(pwd)/docs/arch.svg"

  test:
    desc: Runs all project tests
    deps: [build]
    cmds:
      - cd build && ctest --output-on-failure
