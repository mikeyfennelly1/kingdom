name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: true
      - name: Run CI Suite
        run: devbox run ./scripts/ci.sh
        env:
          VERBOSE: false
