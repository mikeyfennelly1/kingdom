name: docker-release

on:
  workflow_run:
    workflows: [version]
    types: [completed]
    branches: [main]

jobs:
  docker-release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find build run for merged PR
        id: find-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MERGE_SHA="${{ github.event.workflow_run.head_sha }}"

          # Resolve the PR that introduced this merge commit, then get its head SHA
          HEAD_SHA=$(gh api "repos/${{ github.repository }}/commits/${MERGE_SHA}/pulls" \
            --jq '.[0].head.sha')

          # Find the most recent successful build run for that PR head commit
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/build.yml/runs?head_sha=${HEAD_SHA}&status=success&per_page=1" \
            --jq '.workflow_runs[0].id')

          echo "head_sha=${HEAD_SHA}" >> $GITHUB_OUTPUT
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT

      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ steps.find-run.outputs.run_id }} --name kds-out --dir out/

      - name: Extract semver from latest tag
        id: version
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kingdom:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kingdom:latest
