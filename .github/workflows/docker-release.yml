name: docker-release

on:
  workflow_run:
    workflows: [version]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract semver from latest tag
        id: version
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build kds binary and Nix closure
        run: |
          chmod +x ./scripts/create-closure.sh
          ./scripts/create-closure.sh

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kingdom:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kingdom:latest
