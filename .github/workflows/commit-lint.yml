name: commit-lint

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'ansible/**'
      - '.github/**'

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
